syntax = "proto3";

package demo;

option csharp_namespace = "Generated.Demo";
//option go_package = "github.com/ahfuzhang/BaoHuLu/examples/Demo";

message LoginRequest {
  string user_name = 1;
  string user_password_sha256 = 2;
}
message LoginResponse {
  uint32 code = 1;
  string message = 2;
  // @VarName=UserID
  uint64 user_id = 3;
  string user_session = 4;
}

message GetUserInfoRequest {
  // @VarName=UserID
  uint32 user_id = 1;
  string user_session = 2;
}
message GetUserInfoResponse {
  uint32 code = 1;
  string message = 2;
  // @VarName=UserID
  uint64 user_id = 3;
  string user_name = 4;
  map<string, string> tags = 5;
}

message SetUserTagsRequest {
  // @VarName=UserID
  uint32 user_id = 1;
  string user_session = 2;
  map<string, string> tags = 5;
}

message SetUserTagsResponse {
  uint32 code = 1;
  string message = 2;
}

// 用户的信息
message User {
  // @VarName=UserID
  uint32 user_id = 1;
  string user_session = 2;
  map<string, string> tags = 5;
  string user_name = 4;
}

service Demo {
  // @path=/api/v1/login
  rpc Login(LoginRequest) returns (LoginResponse) {}

  // @path=/api/v1/get_user_info
  rpc GetUserInfo(GetUserInfoRequest) returns (GetUserInfoResponse) {}

  // @path=/api/v1/set_user_tags
  rpc SetUserTags(SetUserTagsRequest) returns (SetUserTagsResponse) {}
}
